<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>竞品准真实值看板模板</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fffdf8;
      --line: #ded6c8;
      --text: #1f2933;
      --muted: #667085;
      --teal: #0f7b73;
      --amber: #b96905;
      --soft-teal: #dff1ec;
      --soft-amber: #f4e7d3;
      --shadow: 0 12px 32px rgba(31, 41, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      line-height: 1.5;
    }

    button,
    input {
      font: inherit;
    }

    button:focus-visible,
    input:focus-visible {
      outline: 3px solid rgba(15, 123, 115, 0.24);
      outline-offset: 2px;
    }

    .page {
      width: min(1440px, calc(100% - 48px));
      margin: 0 auto;
      padding: 38px 0 30px;
    }

    .report-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: start;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 32px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .meta,
    .note {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .data-status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 0 4px rgba(15, 123, 115, 0.12);
    }

    .template-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 64px;
      margin-bottom: 18px;
      padding: 10px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .button,
    .file-button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .button:hover,
    .file-button:hover {
      border-color: var(--teal);
      color: var(--teal);
    }

    .file-button input {
      display: none;
    }

    .page-state {
      margin-bottom: 18px;
      padding: 22px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.58);
      color: var(--muted);
      text-align: center;
    }

    .page-state.error {
      border-color: rgba(185, 105, 5, 0.42);
      color: var(--amber);
    }

    .hero,
    .metric-card,
    .panel,
    .diagnosis-card,
    .footnote {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.86);
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 22px;
      align-items: center;
      padding: 26px 30px;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin: 0 0 6px;
      font-size: 17px;
      font-weight: 800;
    }

    .hero-block {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .hero-label {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.2;
    }

    .hero-label.advantage {
      color: var(--amber);
    }

    .hero-label.warning {
      color: var(--teal);
    }

    .summary {
      margin: 0;
      color: var(--amber);
      font-size: 28px;
      font-weight: 900;
      line-height: 1.28;
    }

    .weakness-box {
      min-width: 0;
    }

    .weakness-text {
      margin: 0;
      color: var(--teal);
      font-size: 28px;
      font-weight: 900;
      line-height: 1.28;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 22px;
      margin-bottom: 24px;
    }

    .metric-card {
      padding: 20px 22px 14px;
      min-height: 150px;
    }

    .metric-title {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .metric-values {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: end;
    }

    .value {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.035em;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .self {
      color: var(--text);
    }

    .competitor {
      color: var(--text);
    }

    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .gap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      margin-top: 12px;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .gap-divider {
      width: 1px;
      height: 14px;
      background: currentColor;
      opacity: 0.38;
    }

    .gap.advantage {
      background: var(--soft-amber);
      color: var(--amber);
    }

    .gap.warning {
      background: var(--soft-teal);
      color: var(--teal);
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(360px, 0.95fr);
      gap: 28px;
      margin-bottom: 24px;
    }

    .panel {
      padding: 26px 28px;
    }

    .panel h2 {
      margin: 0 0 4px;
      font-size: 24px;
      line-height: 1.25;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 20px 0;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .tab {
      border: 1px solid var(--line);
      background: transparent;
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--muted);
      cursor: pointer;
    }

    .tab.active {
      background: var(--teal);
      border-color: var(--teal);
      color: white;
      font-weight: 800;
    }

    .tab-body h3 {
      margin: 0 0 14px;
      color: var(--teal);
      font-size: 19px;
    }

    .tab-section {
      margin-top: 18px;
    }

    .tab-section-title {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 900;
      color: var(--text);
    }

    .insight-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .insight-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbf7ef;
      padding: 7px 10px 8px;
    }

    .insight-card.warning {
      background: var(--soft-teal);
    }

    .insight-card.advantage {
      background: var(--soft-amber);
    }

    .insight-card h4 {
      margin: 0;
      font-size: 13px;
      line-height: 1.35;
      color: var(--amber);
    }

    .insight-card.warning h4 {
      color: var(--teal);
    }

    .insight-card p {
      margin: 0;
      color: #46515c;
      font-size: 13px;
    }

    .insight-card .insight-type {
      color: var(--amber);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .insight-card.warning .insight-type {
      color: var(--teal);
    }

    .insight-card-label {
      min-width: 0;
    }

    .insight-compare {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 5px;
      color: var(--amber);
      font-size: 12px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .insight-compare.warning {
      color: var(--teal);
    }

    .insight-compare-divider {
      width: 1px;
      height: 12px;
      background: currentColor;
      opacity: 0.4;
    }

    .compare-row {
      display: grid;
      grid-template-columns: minmax(120px, 0.8fr) 1fr 1fr;
      gap: 14px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(222, 214, 200, 0.75);
    }

    .compare-row:last-child {
      border-bottom: 0;
    }

    .label {
      font-weight: 800;
    }

    .bar-wrap {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .bar {
      height: 9px;
      border-radius: 999px;
      background: #e8e0d4;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
    }

    .bar-self span {
      background: var(--teal);
    }

    .bar-competitor span {
      background: var(--amber);
    }

    .table-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .dimension-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .dimension-tab {
      border: 1px solid var(--line);
      background: #fffdf8;
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
    }

    .dimension-tab.active {
      border-color: var(--teal);
      background: var(--soft-teal);
      color: var(--teal);
      font-weight: 900;
    }

    .table-wrap {
      max-height: 360px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.78);
    }

    .data-table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
      font-size: 13px;
    }

    .data-table th,
    .data-table td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(222, 214, 200, 0.72);
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    .data-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f7f1e8;
      color: #3d4650;
      font-weight: 900;
    }

    .sort-button {
      appearance: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      width: auto;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font-size: inherit;
      font-weight: inherit;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
    }

    .sort-button:focus-visible {
      outline: none;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .sort-button:hover,
    .sort-button.active {
      color: var(--text);
    }

    .sort-arrow {
      color: var(--teal);
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
    }

    .data-table th:first-child,
    .data-table td:first-child {
      position: sticky;
      left: 0;
      min-width: 176px;
      background: #fffdf8;
      box-shadow: 6px 0 10px -8px rgba(31, 41, 51, 0.28);
    }

    .data-table th:first-child {
      z-index: 3;
      background: #f7f1e8;
      box-shadow: 6px 0 10px -8px rgba(31, 41, 51, 0.34);
    }

    .data-table td:first-child {
      z-index: 1;
    }

    .data-table th:first-child::after,
    .data-table td:first-child::after {
      position: absolute;
      top: 0;
      right: -6px;
      bottom: 0;
      width: 6px;
      background: linear-gradient(90deg, rgba(31, 41, 51, 0.14), rgba(31, 41, 51, 0));
      content: "";
      pointer-events: none;
    }

    .data-table th:first-child::after {
      background: linear-gradient(90deg, rgba(31, 41, 51, 0.18), rgba(31, 41, 51, 0));
    }

    .data-table-keywords th:first-child,
    .data-table-keywords td:first-child {
      width: 144px;
      min-width: 144px;
      max-width: 144px;
    }

    .data-table-customer_profile th:first-child,
    .data-table-customer_profile td:first-child {
      width: 124px;
      min-width: 124px;
      max-width: 124px;
    }

    .frozen-cell-tip {
      position: relative;
      display: block;
      min-width: 0;
      outline: none;
    }

    .frozen-cell-label {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .frozen-cell-tip::before,
    .frozen-cell-tip::after {
      position: absolute;
      top: 50%;
      z-index: 8;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 120ms ease, visibility 120ms ease;
    }

    .frozen-cell-tip::before {
      left: calc(100% + 5px);
      border-top: 6px solid transparent;
      border-right: 7px solid #27313a;
      border-bottom: 6px solid transparent;
      content: "";
      transform: translateY(-50%);
    }

    .frozen-cell-tip::after {
      left: calc(100% + 12px);
      width: max-content;
      max-width: 280px;
      padding: 7px 9px;
      border-radius: 6px;
      background: #27313a;
      box-shadow: 0 8px 22px rgba(31, 41, 51, 0.2);
      color: #fff;
      content: attr(data-tooltip);
      font-size: 12px;
      font-weight: 500;
      line-height: 1.45;
      white-space: normal;
      transform: translateY(-50%);
    }

    .data-table td:first-child:has(.frozen-cell-tip:hover),
    .data-table td:first-child:has(.frozen-cell-tip:focus) {
      z-index: 6;
    }

    .frozen-cell-tip:hover::before,
    .frozen-cell-tip:hover::after,
    .frozen-cell-tip:focus::before,
    .frozen-cell-tip:focus::after,
    .frozen-cell-tip.show-tooltip::before,
    .frozen-cell-tip.show-tooltip::after {
      opacity: 1;
      visibility: visible;
    }

    .tree-cell {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding-left: calc(var(--tree-depth) * 20px);
    }

    .tree-toggle,
    .tree-toggle-placeholder {
      width: 15px;
      height: 15px;
      flex: 0 0 15px;
    }

    .tree-toggle {
      display: inline-grid;
      padding: 0;
      place-items: center;
      border: 1px solid #9aa1a8;
      border-radius: 3px;
      background: #fff;
      color: #5f6872;
      font-size: 12px;
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
    }

    .tree-label {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cell-good {
      color: var(--amber);
      font-weight: 900;
    }

    .cell-bad {
      color: var(--teal);
      font-weight: 900;
    }

    .cell-neutral {
      color: var(--muted);
      font-weight: 700;
    }

    .data-table tr:last-child td {
      border-bottom: 0;
    }

    .notes {
      margin: 18px 0 0;
      padding-left: 18px;
      color: #46515c;
    }

    .notes li {
      margin: 5px 0;
    }

    .diagnosis-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .diagnosis-card {
      box-shadow: none;
      padding: 10px 12px;
      background: #efe8dd;
    }

    .diagnosis-card.advantage {
      background: var(--soft-amber);
    }

    .diagnosis-card.warning {
      background: var(--soft-teal);
    }

    .diagnosis-card h3 {
      margin: 2px 0 0;
      color: var(--text);
      font-size: 13px;
      line-height: 1.45;
    }

    .diagnosis-card.warning h3 {
      color: var(--text);
    }

    .diagnosis-card p {
      margin: 0;
      color: #46515c;
      font-size: 13px;
    }

    .diagnosis-type {
      color: var(--amber);
      font-size: 11px !important;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .diagnosis-card.warning .diagnosis-type {
      color: var(--teal);
    }

    .diagnosis-context {
      margin-top: 3px !important;
      color: var(--muted);
      font-size: 11px !important;
    }

    .footnote {
      padding: 14px 22px;
      color: var(--muted);
      font-size: 13px;
      box-shadow: none;
    }

    @media (max-width: 980px) {
      .page {
        width: min(100% - 28px, 760px);
        padding-top: 24px;
      }

      .report-header,
      .hero,
      .content {
        grid-template-columns: 1fr;
      }

      .template-controls {
        align-items: stretch;
        flex-direction: column;
        gap: 12px;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 25px;
      }

      .summary,
      .weakness-text {
        font-size: 22px;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .compare-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="report-header">
      <div>
        <h1 id="title">竞品准真实值看板</h1>
        <p class="meta" id="meta">等待数据载入</p>
      </div>
      <div class="data-status" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="updated-at">等待报告数据</span>
      </div>
    </header>

    <section class="template-controls" aria-label="模板数据操作">
      <p class="note" id="load-note">生成版 HTML 可内置当前分析结果；模板预览只读取同目录 analysis_result.json。</p>
      <div class="toolbar">
        <button class="button" type="button" id="reload-json">读取同目录 JSON</button>
        <label class="file-button">
          导入 JSON
          <input id="json-file" type="file" accept="application/json,.json">
        </label>
      </div>
    </section>

    <section class="page-state" id="page-state" aria-live="polite">正在读取报告数据</section>

    <div id="dashboard" hidden>

    <section class="hero">
      <div class="hero-block">
        <p class="hero-label advantage">优点</p>
        <p class="summary" id="summary">-</p>
      </div>
      <div class="hero-block weakness-box">
        <p class="hero-label warning">弱点</p>
        <p class="weakness-text" id="hero-note">-</p>
      </div>
    </section>

    <section class="metrics" id="metrics"></section>

    <section class="content">
      <article class="panel">
        <h2>差距来源分析</h2>
        <p class="note">用 Tab 承载流量来源、关键词、客户画像三类解释项。</p>
        <div class="tabs" id="tabs"></div>
        <div class="tab-body" id="tab-body"></div>
      </article>

      <aside class="panel">
        <h2>AI核心判断与建议</h2>
        <p class="note">覆盖三类差距来源，给出 5 条优先动作</p>
        <div class="diagnosis-list" id="diagnosis"></div>
      </aside>
    </section>

    <footer class="footnote" id="risks">-</footer>
    </div>
  </main>

  <script>
    const state = {
      data: null,
      activeTab: 0,
      dimensions: {},
      sorts: {},
      expandedTrafficPaths: new Set(),
      trafficTreeKey: "",
      renderedTableKey: ""
    };

    /**
     * 功能说明：切换模板的加载、错误和看板展示状态。
     * 参数 message：状态提示文本。
     * 参数 isError：是否使用错误状态样式。
     * 返回值：无返回值，直接更新 DOM。
     */
    function showPageState(message, isError = false) {
      const pageState = document.querySelector("#page-state");
      pageState.hidden = false;
      pageState.classList.toggle("error", isError);
      pageState.textContent = message;
      document.querySelector("#dashboard").hidden = true;
    }

    /**
     * 功能说明：格式化页面中展示的值。
     * 参数 value：待展示的原始值。
     * 参数 unit：数值单位。
     * 返回值：适合放入页面的字符串。
     */
    function formatValue(value, unit = "") {
      if (typeof value === "number") {
        return `${value.toFixed(2)}${unit}`;
      }
      return `${value ?? "-"}${unit}`;
    }

    /**
     * 功能说明：计算重点卡的带方向差值。
     * 参数 item：包含本品值、竞品值和单位的重点数据。
     * 返回值：带正负方向和展示单位的差值文本。
     */
    function formatHighlightGap(item) {
      const selfValue = typeof item.self_value === "number" ? item.self_value : 0;
      const competitorValue = typeof item.competitor_value === "number" ? item.competitor_value : 0;
      const gap = selfValue - competitorValue;
      const sign = gap > 0 ? "+" : "";
      const unit = item.unit === "%" ? "pct" : (item.unit || "");
      return `${sign}${gap.toFixed(2)}${unit}`;
    }

    /**
     * 功能说明：计算重点卡的强弱倍率或独有状态。
     * 参数 item：包含本品值和竞品值的重点数据。
     * 返回值：倍率、独有状态或无可比标识。
     */
    function formatHighlightRatio(item) {
      const selfValue = typeof item.self_value === "number" ? item.self_value : 0;
      const competitorValue = typeof item.competitor_value === "number" ? item.competitor_value : 0;
      if (selfValue > 0 && competitorValue > 0) {
        return `${(Math.max(selfValue, competitorValue) / Math.min(selfValue, competitorValue)).toFixed(2)}x`;
      }
      if (selfValue > 0) {
        return "本品独有";
      }
      if (competitorValue > 0) {
        return "竞品独有";
      }
      return "-";
    }

    /**
     * 功能说明：把核心指标差值压缩为带方向符号的纯数字。
     * 参数 item：核心指标卡数据。
     * 返回值：领先为正数、落后为负数的简短差值文本。
     */
    function formatMetricGap(item) {
      if (item.gap_abs_text == null || item.gap_abs_text === "") {
        return "-";
      }
      const value = String(item.gap_abs_text).replaceAll(",", "").replace(/^[+-]/, "");
      const sign = item.status === "warning" ? "-" : "+";
      const unit = item.id === "conversion_rate" ? "pct" : "";
      return `${sign}${value}${unit}`;
    }

    /**
     * 功能说明：从核心指标倍率说明中提取纯倍率数字。
     * 参数 item：核心指标卡数据。
     * 返回值：不包含本品或竞品说明的倍率文本。
     */
    function formatMetricRatio(item) {
      const match = String(item.ratio_text || "").match(/(\d+(?:\.\d+)?)x/i);
      return match ? `${match[1]}x` : "-";
    }

    /**
     * 功能说明：判断表格单元格的展示状态。
     * 参数 value：单元格原始值。
     * 参数 column：当前列定义。
     * 返回值：状态样式类名。
     */
    function valueTone(value, column = {}) {
      const text = String(value ?? "");
      const key = String(column.key || "");
      if (/落后|竞品独有|补词机会|成交落后|访客落后|短板/.test(text)) {
        return "cell-bad";
      }
      if (/领先|本品独有|本品优势|优势|保持优势/.test(text)) {
        return "cell-good";
      }
      if (typeof value === "number" && /(gap|差距|visitor_gap|gmv_gap|order_gap|gap_rate)/.test(key)) {
        if (value > 0) {
          return "cell-good";
        }
        if (value < 0) {
          return "cell-bad";
        }
      }
      if (text === "-" || text === "暂无") {
        return "cell-neutral";
      }
      return "";
    }

    /**
     * 功能说明：渲染带状态样式的数据表单元格。
     * 参数 row：当前表格行。
     * 参数 column：当前列定义。
     * 返回值：单元格 HTML 字符串。
     */
    function renderCell(row, column) {
      const value = row[column.key];
      const tone = valueTone(value, column);
      return `<span class="${tone}">${formatValue(value, column.unit || "")}</span>`;
    }

    /**
     * 功能说明：比较两行在指定列上的排序先后，并把空值固定放在末尾。
     * 参数 leftRow：左侧数据行。
     * 参数 rightRow：右侧数据行。
     * 参数 column：当前排序列定义。
     * 参数 direction：排序方向，desc 为降序，asc 为升序。
     * 返回值：适用于 Array.sort 的比较结果。
     */
    function compareRows(leftRow, rightRow, column, direction) {
      const leftValue = leftRow[column.key];
      const rightValue = rightRow[column.key];
      const leftEmpty = leftValue == null || leftValue === "" || leftValue === "-";
      const rightEmpty = rightValue == null || rightValue === "" || rightValue === "-";
      if (leftEmpty || rightEmpty) {
        return leftEmpty === rightEmpty ? 0 : leftEmpty ? 1 : -1;
      }
      let result;
      if (typeof leftValue === "number" && typeof rightValue === "number") {
        result = leftValue - rightValue;
      } else {
        result = String(leftValue).localeCompare(String(rightValue), "zh-CN", { numeric: true, sensitivity: "base" });
      }
      return direction === "desc" ? -result : result;
    }

    /**
     * 功能说明：按当前列稳定排序普通表格行。
     * 参数 rows：待排序的数据行。
     * 参数 column：当前排序列定义；为空时保持原始顺序。
     * 参数 direction：排序方向。
     * 返回值：排序后的新数组。
     */
    function sortRows(rows, column, direction) {
      if (!column || !direction) {
        return rows;
      }
      return rows
        .map((row, index) => ({ row, index }))
        .sort((left, right) => compareRows(left.row, right.row, column, direction) || left.index - right.index)
        .map((item) => item.row);
    }

    /**
     * 功能说明：渲染带省略展示和完整信息 Tooltip 的冻结文本单元格。
     * 参数 row：当前表格行。
     * 参数 column：冻结首列定义。
     * 返回值：冻结列使用的 HTML 字符串。
     */
    function renderFrozenTextCell(row, column) {
      const text = formatValue(row[column.key], column.unit || "");
      return `<span class="frozen-cell-tip" tabindex="0" data-tooltip="${text}"><span class="frozen-cell-label">${text}</span></span>`;
    }

    /**
     * 功能说明：把流量来源行整理为可展开树，并按展开状态计算当前可见行。
     * 参数 rows：流量来源数据行。
     * 参数 sortColumn：当前排序列定义；为空时保持原始同级顺序。
     * 参数 sortDirection：当前排序方向。
     * 返回值：树形行和节点元信息。
     */
    function buildTrafficTree(rows, sortColumn, sortDirection) {
      const nodes = rows.map((row, index) => {
        const levels = [row.level_1, row.level_2, row.level_3].filter((value) => value && value !== "-");
        const key = levels.join(" > ");
        return {
          row,
          index,
          key,
          label: levels.at(-1) || row.path || "-",
          depth: Math.max(levels.length - 1, 0),
          ancestors: levels.slice(0, -1).map((_, levelIndex) => levels.slice(0, levelIndex + 1).join(" > ")),
          parentKey: levels.length > 1 ? levels.slice(0, -1).join(" > ") : ""
        };
      });
      const parentKeys = new Set(nodes.flatMap((node) => node.ancestors));
      const treeKey = `${state.data?.meta?.period_key || "-"}:${nodes.map((node) => node.key).join("|")}`;
      if (state.trafficTreeKey !== treeKey) {
        state.trafficTreeKey = treeKey;
        state.expandedTrafficPaths = new Set(
          nodes.filter((node) => node.depth === 0 && parentKeys.has(node.key)).map((node) => node.key)
        );
      }
      const childrenByParent = new Map();
      nodes.forEach((node) => {
        const siblings = childrenByParent.get(node.parentKey) || [];
        siblings.push(node);
        childrenByParent.set(node.parentKey, siblings);
      });
      if (sortColumn && sortDirection) {
        childrenByParent.forEach((siblings) => {
          siblings.sort((left, right) =>
            compareRows(left.row, right.row, sortColumn, sortDirection) || left.index - right.index
          );
        });
      }
      const visibleNodes = [];
      const appendChildren = (parentKey) => {
        (childrenByParent.get(parentKey) || []).forEach((node) => {
          visibleNodes.push(node);
          if (state.expandedTrafficPaths.has(node.key)) {
            appendChildren(node.key);
          }
        });
      };
      appendChildren("");
      return {
        rows: visibleNodes.map((node) => node.row),
        metaByKey: new Map(nodes.map((node) => [node.key, { ...node, hasChildren: parentKeys.has(node.key) }]))
      };
    }

    /**
     * 功能说明：渲染树形渠道首列。
     * 参数 row：渠道数据行。
     * 参数 tree：树形渲染数据。
     * 返回值：带层级缩进和开关的 HTML。
     */
    function renderTrafficTreeCell(row, tree) {
      const key = [row.level_1, row.level_2, row.level_3].filter((value) => value && value !== "-").join(" > ");
      const meta = tree.metaByKey.get(key) || { key, label: row.path || "-", depth: 0, hasChildren: false };
      const expanded = state.expandedTrafficPaths.has(meta.key);
      const control = meta.hasChildren
        ? `<button class="tree-toggle" type="button" data-traffic-tree-key="${meta.key}" aria-expanded="${expanded}" aria-label="${expanded ? "收起" : "展开"}${meta.label}">${expanded ? "−" : "+"}</button>`
        : '<span class="tree-toggle-placeholder" aria-hidden="true"></span>';
      return `<span class="tree-cell" style="--tree-depth:${meta.depth}">${control}<span class="tree-label">${meta.label}</span></span>`;
    }

    /**
     * 功能说明：计算对比条的相对宽度。
     * 参数 value：当前项数值。
     * 参数 max：同组最大数值。
     * 返回值：百分比宽度。
     */
    function ratioWidth(value, max) {
      if (typeof value !== "number") {
        return 0;
      }
      if (max <= 0) {
        return 100;
      }
      return Math.max(4, Math.round((value / max) * 100));
    }

    /**
     * 功能说明：把 analysis_result 结构渲染到看板页面。
     * 参数 data：分析结果 JSON 对象。
     * 返回值：无返回值，直接更新 DOM。
     */
    function renderDashboard(data) {
      console.info("开始渲染看板", data?.meta);
      state.data = data;
      state.dimensions = {};
      document.querySelector("#title").textContent = data.meta?.title || "竞品准真实值看板";
      document.querySelector("#meta").textContent = [
        data.meta?.period,
        data.meta?.granularity ? `分析粒度：${data.meta.granularity}` : "",
        data.meta?.self_spu ? `本品 SPU ${data.meta.self_spu}` : "",
        data.meta?.competitor_spu ? `竞品 SPU ${data.meta.competitor_spu}` : ""
      ].filter(Boolean).join(" | ");
      document.querySelector("#summary").textContent = data.meta?.summary || "-";
      document.querySelector("#hero-note").textContent = data.meta?.weakness_summary || "-";
      document.querySelector("#updated-at").textContent = data.meta?.generated_at
        ? `数据生成于 ${String(data.meta.generated_at).slice(0, 19).replace("T", " ")}`
        : "分析结果已载入";

      const metrics = document.querySelector("#metrics");
      metrics.innerHTML = (data.core_metrics || []).map((item) => `
        <article class="metric-card">
          <p class="metric-title">${item.label || "-"}</p>
          <div class="metric-values">
            <div>
              <div class="value self">${formatValue(item.self_value, item.unit)}</div>
              <div class="sub">本品真实值</div>
            </div>
            <div>
              <div class="value competitor">${formatValue(item.competitor_value, item.unit)}</div>
              <div class="sub">竞品估算值</div>
            </div>
          </div>
          <div class="gap ${item.status === "warning" ? "warning" : "advantage"}">
            <span>${formatMetricGap(item)}</span>
            <span class="gap-divider" aria-hidden="true"></span>
            <span>${formatMetricRatio(item)}</span>
          </div>
        </article>
      `).join("");

      renderTabs();
      renderDiagnosis();
      document.querySelector("#risks").textContent = `风险提示：${(data.risks || ["暂无"]).join("；")}`;
      document.querySelector("#page-state").hidden = true;
      document.querySelector("#dashboard").hidden = false;
      console.info("看板渲染完成");
    }

    /**
     * 功能说明：渲染差距来源 Tab 导航与当前面板。
     * 返回值：无返回值，直接更新 DOM。
     */
    function renderTabs() {
      const previousTableWrap = document.querySelector("#tab-body .table-wrap");
      const previousTableScroll = {
        left: previousTableWrap?.scrollLeft || 0,
        top: previousTableWrap?.scrollTop || 0
      };
      const previousTableKey = state.renderedTableKey;
      const previousPageScroll = { left: window.scrollX, top: window.scrollY };
      const tabs = state.data?.tabs || [];
      const nav = document.querySelector("#tabs");
      nav.innerHTML = tabs.map((tab, index) => `
        <button class="tab ${index === state.activeTab ? "active" : ""}" type="button" data-tab-index="${index}">
          ${tab.label || `Tab ${index + 1}`}
        </button>
      `).join("");

      nav.querySelectorAll("[data-tab-index]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeTab = Number(button.dataset.tabIndex);
          console.info("切换分析 Tab", state.activeTab);
          renderTabs();
        });
      });

      const current = tabs[state.activeTab] || tabs[0] || {};
      const currentTableKey = `${state.data?.meta?.period_key || "-"}:${current.id || "-"}`;
      const highlights = current.highlights || current.items || [];
      const max = Math.max(0, ...highlights.flatMap((item) => [
        typeof item.self_value === "number" ? item.self_value : 0,
        typeof item.competitor_value === "number" ? item.competitor_value : 0
      ]));
      const rows = current.rows || [];
      const columns = current.columns || [];
      const currentSort = state.sorts[current.id] || null;
      const sortColumn = currentSort ? columns.find((column) => column.key === currentSort.key) : null;
      const dimensionField = current.dimension_field;
      const dimensionOptions = dimensionField
        ? [...new Set(rows.map((row) => row[dimensionField]).filter(Boolean))]
        : [];
      const activeDimension = state.dimensions?.[current.id] || dimensionOptions[0] || "";
      const dimensionRows = activeDimension
        ? rows.filter((row) => row[dimensionField] === activeDimension)
        : rows;
      const trafficTree = current.id === "traffic"
        ? buildTrafficTree(dimensionRows, sortColumn, currentSort?.direction)
        : null;
      const displayRows = trafficTree
        ? trafficTree.rows
        : sortRows(dimensionRows, sortColumn, currentSort?.direction);

      document.querySelector("#tab-body").innerHTML = `
        <h3>${current.headline || "-"}</h3>
        <section class="tab-section">
          <p class="tab-section-title">优势与劣势</p>
          <div class="insight-grid">
            ${highlights.map((item) => `
              <article class="insight-card ${item.status === "warning" ? "warning" : "advantage"}">
                <div class="insight-card-label">
                  <p class="insight-type">${item.status === "warning" ? "劣势" : "优势"}</p>
                  <h4>${item.label || "-"}</h4>
                </div>
                <div class="insight-compare ${item.status === "warning" ? "warning" : "advantage"}">
                  <span>${formatHighlightGap(item)}</span>
                  <span class="insight-compare-divider" aria-hidden="true"></span>
                  <span>${formatHighlightRatio(item)}</span>
                </div>
              </article>
            `).join("")}
          </div>
        </section>
        <section class="tab-section">
          <div class="table-tools">
            <p class="tab-section-title">完整数据对比</p>
          </div>
          ${dimensionOptions.length ? `
            <div class="dimension-tabs">
              ${dimensionOptions.map((dimension) => `
                <button class="dimension-tab ${dimension === activeDimension ? "active" : ""}" type="button" data-dimension="${dimension}">
                  ${dimension}
                </button>
              `).join("")}
            </div>
          ` : ""}
          ${columns.length ? `
            <div class="table-wrap">
              <table class="data-table data-table-${current.id || "default"}">
                <thead>
                  <tr>${columns.map((column) => {
                    const active = currentSort?.key === column.key;
                    const direction = active ? currentSort.direction : "";
                    const ariaSort = direction === "desc" ? "descending" : direction === "asc" ? "ascending" : "none";
                    return `<th aria-sort="${ariaSort}">
                      <button class="sort-button ${active ? "active" : ""}" type="button" data-sort-key="${column.key}">
                        <span>${column.label}</span>
                        ${active ? `<span class="sort-arrow" aria-hidden="true">${direction === "desc" ? "↓" : "↑"}</span>` : ""}
                      </button>
                    </th>`;
                  }).join("")}</tr>
                </thead>
                <tbody>
                  ${displayRows.map((row) => `
                    <tr>
                      ${columns.map((column, columnIndex) => `<td>${trafficTree && column.key === "path"
                        ? renderTrafficTreeCell(row, trafficTree)
                        : columnIndex === 0 && ["keywords", "customer_profile"].includes(current.id)
                          ? renderFrozenTextCell(row, column)
                          : renderCell(row, column)}</td>`).join("")}
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          ` : `
            <div>
              ${highlights.map((item) => `
            <div class="compare-row">
              <div class="label">
                ${item.label || "-"}
                ${item.gap_text ? `<div class="sub">${item.gap_text}</div>` : ""}
              </div>
              <div class="bar-wrap">
                <span>本品 ${formatValue(item.self_value, item.unit)}</span>
                <div class="bar bar-self"><span style="width:${ratioWidth(item.self_value, max)}%"></span></div>
              </div>
              <div class="bar-wrap">
                <span>竞品 ${formatValue(item.competitor_value, item.unit)}</span>
                <div class="bar bar-competitor"><span style="width:${ratioWidth(item.competitor_value, max)}%"></span></div>
              </div>
            </div>
              `).join("")}
            </div>
          `}
        </section>
        <ul class="notes">
          ${(current.notes || []).map((note) => `<li>${note}</li>`).join("")}
        </ul>
      `;
      state.renderedTableKey = currentTableKey;
      if (previousTableKey === currentTableKey) {
        const currentTableWrap = document.querySelector("#tab-body .table-wrap");
        if (currentTableWrap) {
          currentTableWrap.scrollLeft = previousTableScroll.left;
          currentTableWrap.scrollTop = previousTableScroll.top;
        }
        window.scrollTo(previousPageScroll.left, previousPageScroll.top);
      }

      document.querySelectorAll("[data-dimension]").forEach((button) => {
        button.addEventListener("click", () => {
          state.dimensions = state.dimensions || {};
          state.dimensions[current.id] = button.dataset.dimension;
          renderTabs();
        });
      });
      document.querySelectorAll("[data-sort-key]").forEach((button) => {
        button.addEventListener("click", () => {
          const key = button.dataset.sortKey;
          const previous = state.sorts[current.id];
          if (!previous || previous.key !== key) {
            state.sorts[current.id] = { key, direction: "desc" };
          } else if (previous.direction === "desc") {
            state.sorts[current.id] = { key, direction: "asc" };
          } else {
            delete state.sorts[current.id];
          }
          renderTabs();
          document.querySelector(`[data-sort-key="${CSS.escape(key)}"]`)?.focus({ preventScroll: true });
        });
      });
      document.querySelectorAll("[data-traffic-tree-key]").forEach((button) => {
        button.addEventListener("click", () => {
          const key = button.dataset.trafficTreeKey;
          if (state.expandedTrafficPaths.has(key)) {
            state.expandedTrafficPaths.delete(key);
          } else {
            state.expandedTrafficPaths.add(key);
          }
          renderTabs();
          const restoredToggle = [...document.querySelectorAll("[data-traffic-tree-key]")]
            .find((item) => item.dataset.trafficTreeKey === key);
          restoredToggle?.focus({ preventScroll: true });
        });
      });
      document.querySelectorAll(".frozen-cell-tip").forEach((tip) => {
        tip.addEventListener("click", () => tip.classList.toggle("show-tooltip"));
        tip.addEventListener("blur", () => tip.classList.remove("show-tooltip"));
      });
    }

    /**
     * 功能说明：渲染诊断建议卡片。
     * 返回值：无返回值，直接更新 DOM。
     */
    function renderDiagnosis() {
      const target = document.querySelector("#diagnosis");
      const tabs = state.data?.tabs || [];
      const primarySuggestions = [];
      const secondarySuggestions = [];
      tabs.forEach((tab) => {
        const highlights = [...(tab.highlights || [])].sort((left, right) =>
          Number(right.status === "warning") - Number(left.status === "warning")
        );
        const suggestions = highlights.map((item) => ({ ...item, sourceLabel: tab.label || "差距来源" }));
        if (suggestions[0]) {
          primarySuggestions.push(suggestions[0]);
        }
        secondarySuggestions.push(...suggestions.slice(1));
      });
      const suggestions = [...primarySuggestions, ...secondarySuggestions].slice(0, 5);
      target.innerHTML = suggestions.map((item) => `
        <section class="diagnosis-card ${item.status === "warning" ? "warning" : "advantage"}">
          <p class="diagnosis-type">${item.sourceLabel} · ${item.status === "warning" ? "劣势" : "优势"}</p>
          <h3>${item.action || "持续跟踪当前差距并验证优化效果"}</h3>
          <p class="diagnosis-context">关注：${item.label || "-"}</p>
        </section>
      `).join("") || '<p class="empty-inline">当前周期暂无行动建议</p>';
    }

    /**
     * 功能说明：从同目录读取 JSON，适合通过 HTTP 服务打开页面时使用。
     * 返回值：Promise，成功时渲染页面，失败时保留当前提示。
     */
    async function loadSiblingJson() {
      try {
        console.info("开始读取同目录 JSON");
        showPageState("正在读取同目录 analysis_result.json");
        const response = await fetch("./analysis_result.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        document.querySelector("#load-note").textContent = "已读取同目录 analysis_result.json。";
        renderDashboard(data);
      } catch (error) {
        console.warn("同目录 JSON 读取失败", error);
        document.querySelector("#load-note").textContent = "未读取到同目录 analysis_result.json，也可以手动导入分析结果。";
        document.querySelector("#updated-at").textContent = "等待报告数据";
        showPageState("暂无报告数据，请生成报告或导入 analysis_result.json", true);
      }
    }

    document.querySelector("#reload-json").addEventListener("click", loadSiblingJson);
    document.querySelector("#json-file").addEventListener("change", async (event) => {
      const [file] = event.target.files || [];
      if (!file) {
        return;
      }
      try {
        console.info("开始导入 JSON 文件", file.name);
        const data = JSON.parse(await file.text());
        document.querySelector("#load-note").textContent = `已导入 ${file.name}。`;
        renderDashboard(data);
      } catch (error) {
        console.error("JSON 导入失败", error);
        document.querySelector("#load-note").textContent = "JSON 导入失败，请检查文件格式。";
        showPageState("JSON 导入失败，请检查文件格式", true);
      }
    });

    if (window.__ANALYSIS_DATA__) {
      document.querySelector("#load-note").textContent = "已读取 HTML 内置数据。";
      renderDashboard(window.__ANALYSIS_DATA__);
    } else {
      loadSiblingJson();
    }
  </script>
</body>
</html>
