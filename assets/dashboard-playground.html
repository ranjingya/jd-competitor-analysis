<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>竞品看板多周期切换 Playground</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fffdf8;
      --line: #ded6c8;
      --text: #1f2933;
      --muted: #667085;
      --teal: #0f7b73;
      --amber: #b96905;
      --soft-teal: #dff1ec;
      --soft-amber: #f4e7d3;
      --shadow: 0 12px 32px rgba(31, 41, 51, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      line-height: 1.5;
    }

    .page {
      width: min(1440px, calc(100% - 48px));
      margin: 0 auto;
      padding: 42px 0 32px;
    }

    .report-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: start;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 32px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .meta,
    .note {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .data-status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 0 4px rgba(15, 123, 115, 0.12);
    }

    .view-switcher {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 64px;
      margin-bottom: 18px;
      padding: 10px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .granularity-switch {
      display: inline-grid;
      grid-template-columns: repeat(3, 1fr);
      width: 270px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.7);
    }

    .granularity-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 36px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .granularity-button.active {
      background: var(--teal);
      color: white;
    }

    .granularity-count {
      min-width: 20px;
      padding: 1px 6px;
      border-radius: 999px;
      background: rgba(102, 112, 133, 0.12);
      font-size: 11px;
      line-height: 18px;
      text-align: center;
    }

    .granularity-button.active .granularity-count {
      background: rgba(255, 255, 255, 0.2);
    }

    .period-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .period-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .period-select {
      min-width: 220px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel);
      color: var(--text);
      padding: 0 36px 0 12px;
      font: inherit;
      font-size: 14px;
      cursor: pointer;
    }

    .switch-note {
      color: var(--muted);
      font-size: 12px;
    }

    .button,
    .file-button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
    }

    .file-button input {
      display: none;
    }

    .hero,
    .metric-card,
    .panel,
    .diagnosis-card,
    .footnote {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.86);
      box-shadow: var(--shadow);
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 22px;
      align-items: center;
      padding: 26px 30px;
      margin-bottom: 24px;
    }

    .eyebrow {
      margin: 0 0 6px;
      font-size: 17px;
      font-weight: 800;
    }

    .hero-block {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .hero-label {
      margin: 0;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.2;
    }

    .hero-label.advantage {
      color: var(--teal);
    }

    .hero-label.warning {
      color: var(--amber);
    }

    .summary {
      margin: 0;
      color: var(--teal);
      font-size: 28px;
      font-weight: 900;
      line-height: 1.28;
    }

    .weakness-box {
      min-width: 0;
    }

    .weakness-text {
      margin: 0;
      color: var(--amber);
      font-size: 28px;
      font-weight: 900;
      line-height: 1.28;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 22px;
      margin-bottom: 24px;
    }

    .metric-card {
      padding: 20px 22px 14px;
      min-height: 150px;
    }

    .metric-title {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .metric-values {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: end;
    }

    .value {
      font-size: 28px;
      font-weight: 900;
      line-height: 1.1;
    }

    .self {
      color: var(--teal);
    }

    .competitor {
      color: var(--amber);
    }

    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .gap {
      margin-top: 12px;
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      font-weight: 800;
    }

    .gap.advantage {
      background: var(--soft-teal);
      color: var(--teal);
    }

    .gap.warning {
      background: var(--soft-amber);
      color: var(--amber);
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1.55fr) minmax(360px, 0.95fr);
      gap: 28px;
      margin-bottom: 24px;
    }

    .panel {
      min-width: 0;
      padding: 26px 28px;
    }

    .panel h2 {
      margin: 0 0 4px;
      font-size: 24px;
      line-height: 1.25;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 20px 0;
      border-bottom: 1px solid var(--line);
      padding-bottom: 10px;
    }

    .tab {
      border: 1px solid var(--line);
      background: transparent;
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--muted);
      cursor: pointer;
    }

    .tab.active {
      background: var(--teal);
      border-color: var(--teal);
      color: white;
      font-weight: 800;
    }

    .tab-body h3 {
      margin: 0 0 14px;
      color: var(--teal);
      font-size: 19px;
    }

    .tab-section {
      margin-top: 18px;
    }

    .tab-section-title {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 900;
      color: var(--text);
    }

    .insight-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .insight-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbf7ef;
      padding: 12px 14px;
    }

    .insight-card.warning {
      background: var(--soft-amber);
    }

    .insight-card.advantage {
      background: var(--soft-teal);
    }

    .insight-card h4 {
      margin: 0 0 8px;
      font-size: 15px;
      color: var(--teal);
    }

    .insight-card.warning h4 {
      color: var(--amber);
    }

    .insight-card p {
      margin: 0;
      color: #46515c;
      font-size: 13px;
    }

    .compare-row {
      display: grid;
      grid-template-columns: minmax(120px, 0.8fr) 1fr 1fr;
      gap: 14px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(222, 214, 200, 0.75);
    }

    .compare-row:last-child {
      border-bottom: 0;
    }

    .label {
      font-weight: 800;
    }

    .bar-wrap {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .bar {
      height: 9px;
      border-radius: 999px;
      background: #e8e0d4;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
    }

    .bar-self span {
      background: var(--teal);
    }

    .bar-competitor span {
      background: var(--amber);
    }

    .table-tools {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .dimension-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .dimension-tab {
      border: 1px solid var(--line);
      background: #fffdf8;
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
    }

    .dimension-tab.active {
      border-color: var(--teal);
      background: var(--soft-teal);
      color: var(--teal);
      font-weight: 900;
    }

    .data-filter {
      width: min(320px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
    }

    .table-wrap {
      width: 100%;
      max-width: 100%;
      max-height: 360px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.78);
    }

    .data-table {
      width: 100%;
      min-width: 720px;
      border-collapse: collapse;
      font-size: 13px;
    }

    .data-table th,
    .data-table td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(222, 214, 200, 0.72);
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    .data-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f7f1e8;
      color: #3d4650;
      font-weight: 900;
    }

    .cell-good {
      color: var(--teal);
      font-weight: 900;
    }

    .cell-bad {
      color: var(--amber);
      font-weight: 900;
    }

    .cell-neutral {
      color: var(--muted);
      font-weight: 700;
    }

    .data-table tr:last-child td {
      border-bottom: 0;
    }

    .notes {
      margin: 18px 0 0;
      padding-left: 18px;
      color: #46515c;
    }

    .notes li {
      margin: 5px 0;
    }

    .diagnosis-list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .diagnosis-card {
      box-shadow: none;
      padding: 14px 16px;
      background: #efe8dd;
    }

    .diagnosis-card.advantage {
      background: var(--soft-teal);
    }

    .diagnosis-card h3 {
      margin: 0 0 5px;
      color: var(--teal);
      font-size: 17px;
    }

    .diagnosis-card.warning h3 {
      color: var(--amber);
    }

    .diagnosis-card p {
      margin: 0;
      color: #46515c;
      font-size: 13px;
    }

    .diagnosis-evidence {
      font-weight: 800;
    }

    .diagnosis-advice {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(27, 31, 42, 0.1);
    }

    .diagnosis-advice-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .diagnosis-card.advantage .diagnosis-advice-label {
      color: var(--teal);
    }

    .diagnosis-card.warning .diagnosis-advice-label {
      color: var(--amber);
    }

    .footnote {
      padding: 14px 22px;
      color: var(--muted);
      font-size: 13px;
      box-shadow: none;
    }

    @media (max-width: 980px) {
      .page {
        width: min(100% - 28px, 760px);
        padding-top: 24px;
      }

      .report-header,
      .hero,
      .content {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
      }

      .view-switcher {
        align-items: stretch;
        flex-direction: column;
        gap: 12px;
      }

      .granularity-switch {
        width: 100%;
      }

      .period-control {
        justify-content: space-between;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 25px;
      }

      .summary,
      .weakness-text {
        font-size: 22px;
      }

      .metrics {
        grid-template-columns: 1fr;
      }

      .compare-row {
        grid-template-columns: 1fr;
      }

      .period-control {
        align-items: stretch;
        flex-direction: column;
      }

      .period-select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="report-header">
      <div>
        <h1 id="title">竞品准真实值看板</h1>
        <p class="meta" id="meta">等待数据载入</p>
        <p class="note" id="load-note">当前为多周期交互演示数据。</p>
      </div>
      <div class="data-status" aria-label="数据状态">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="updated-at">数据更新中</span>
      </div>
    </header>

    <section class="view-switcher" aria-label="分析周期切换">
      <div class="granularity-switch" id="granularity-switch"></div>
      <div class="period-control">
        <label class="period-label" for="period-select">分析周期</label>
        <select class="period-select" id="period-select"></select>
        <span class="switch-note" id="period-note"></span>
      </div>
    </section>

    <section class="hero">
      <div class="hero-block">
        <p class="hero-label advantage">优点</p>
        <p class="summary" id="summary">-</p>
      </div>
      <div class="hero-block weakness-box">
        <p class="hero-label warning">弱点</p>
        <p class="weakness-text" id="hero-note">-</p>
      </div>
    </section>

    <section class="metrics" id="metrics"></section>

    <section class="content">
      <article class="panel">
        <h2>差距来源分析</h2>
        <p class="note">用 Tab 承载流量来源、关键词、客户画像三类解释项。</p>
        <div class="tabs" id="tabs"></div>
        <div class="tab-body" id="tab-body"></div>
      </article>

      <aside class="panel">
        <h2>AI核心判断与建议</h2>
        <p class="note">按优势、短板和动作优先级归纳。</p>
        <div class="diagnosis-list" id="diagnosis"></div>
      </aside>
    </section>

    <footer class="footnote" id="risks">-</footer>
  </main>

  <script>
    const state = {
      data: null,
      bundle: null,
      activeGranularity: "day",
      selectedPeriods: {},
      activeTab: 0,
      dimensions: {}
    };

    /**
     * 功能说明：格式化页面中展示的值。
     * 参数 value：待展示的原始值。
     * 参数 unit：数值单位。
     * 返回值：适合放入页面的字符串。
     */
    function formatValue(value, unit = "") {
      if (typeof value === "number") {
        const text = Number.isInteger(value) ? value.toLocaleString("zh-CN") : value.toFixed(2);
        return `${text}${unit}`;
      }
      return `${value ?? "-"}${unit}`;
    }

    /**
     * 功能说明：判断表格单元格的展示状态。
     * 参数 value：单元格原始值。
     * 参数 column：当前列定义。
     * 返回值：状态样式类名。
     */
    function valueTone(value, column = {}) {
      const text = String(value ?? "");
      const key = String(column.key || "");
      if (/落后|竞品独有|补词机会|成交落后|访客落后|短板/.test(text)) {
        return "cell-bad";
      }
      if (/领先|本品独有|本品优势|优势|保持优势/.test(text)) {
        return "cell-good";
      }
      if (typeof value === "number" && /(gap|差距|visitor_gap|gmv_gap|order_gap|gap_rate)/.test(key)) {
        if (value > 0) {
          return "cell-good";
        }
        if (value < 0) {
          return "cell-bad";
        }
      }
      if (text === "-" || text === "暂无") {
        return "cell-neutral";
      }
      return "";
    }

    /**
     * 功能说明：渲染带状态样式的数据表单元格。
     * 参数 row：当前表格行。
     * 参数 column：当前列定义。
     * 返回值：单元格 HTML 字符串。
     */
    function renderCell(row, column) {
      const value = row[column.key];
      const tone = valueTone(value, column);
      return `<span class="${tone}">${formatValue(value, column.unit || "")}</span>`;
    }

    /**
     * 功能说明：计算对比条的相对宽度。
     * 参数 value：当前项数值。
     * 参数 max：同组最大数值。
     * 返回值：百分比宽度。
     */
    function ratioWidth(value, max) {
      if (typeof value !== "number") {
        return 0;
      }
      if (max <= 0) {
        return 100;
      }
      return Math.max(4, Math.round((value / max) * 100));
    }

    const granularityLabels = {
      day: "日",
      week: "周",
      month: "月"
    };

    /**
     * 功能说明：创建一份可切换的演示分析结果。
     * 参数 granularity：当前报告粒度。
     * 参数 periodStart：周期开始日期。
     * 参数 periodEnd：周期结束日期。
     * 参数 seed：用于形成周期差异的演示序号。
     * 返回值：符合当前页面消费结构的分析结果对象。
     */
    function buildDemoReport(granularity, periodStart, periodEnd, seed) {
      const scale = granularity === "day" ? 1 : granularity === "week" ? 6.4 : 26.8;
      const period = periodStart === periodEnd ? periodStart : `${periodStart}~${periodEnd}`;
      const selfVisitors = Math.round((3280 + seed * 86) * scale);
      const competitorVisitors = Math.round((720 + seed * 34) * scale);
      const selfConversion = Number((12.6 - (seed % 3) * 0.28).toFixed(2));
      const competitorConversion = Number((17.1 + (seed % 2) * 0.32).toFixed(2));
      const selfAov = Number((58.2 + (seed % 4) * 1.15).toFixed(2));
      const competitorAov = Number((112 + (seed % 3) * 4.5).toFixed(2));
      const selfGmv = Math.round(selfVisitors * selfConversion / 100 * selfAov);
      const competitorGmv = Math.round(competitorVisitors * competitorConversion / 100 * competitorAov);
      const visitorGap = selfVisitors - competitorVisitors;
      const gmvGap = selfGmv - competitorGmv;
      const visitorRatio = (selfVisitors / competitorVisitors).toFixed(2);
      const gmvRatio = (selfGmv / competitorGmv).toFixed(2);
      const conversionGap = Number((selfConversion - competitorConversion).toFixed(2));
      const aovGap = Number((selfAov - competitorAov).toFixed(2));
      const sourceNames = ["搜索", "频道", "推荐", "我的京东", "购物车", "活动会场", "店铺页"];
      const trafficRows = sourceNames.map((name, index) => {
        const selfValue = Math.max(12, Math.round((1250 - index * 142 + seed * 11) * scale));
        const competitorValue = Math.max(8, Math.round((250 - index * 19 + seed * 5) * scale));
        const gap = selfValue - competitorValue;
        return {
          path: `站内场域 > ${name}`,
          self_visitors: selfValue,
          competitor_visitors: competitorValue,
          visitor_gap: gap,
          judgement: gap > 0 ? "本品领先" : "本品落后",
          suggested_action: index < 3 ? "优化价格权益、主图卖点与评价承接" : "保持优势，沉淀渠道打法"
        };
      });
      const keywordNames = ["儿童防晒帽", "防晒帽儿童", "儿童遮阳帽", "大帽檐防晒帽", "透气防晒帽", "户外遮阳帽", "女童防晒帽", "男童防晒帽"];
      const keywordRows = keywordNames.map((keyword, index) => {
        const selfValue = Math.max(4, Math.round((620 - index * 58 + seed * 5) * scale));
        const competitorValue = Math.max(3, Math.round((170 + index * 13 + seed * 2) * scale));
        const gap = selfValue - competitorValue;
        return {
          keyword,
          coverage_relation: index === 6 ? "竞品独有" : index === 7 ? "本品独有" : "共同词",
          self_visitors: index === 6 ? 0 : selfValue,
          competitor_visitors: index === 7 ? 0 : competitorValue,
          visitor_gap: index === 6 ? -competitorValue : index === 7 ? selfValue : gap,
          opportunity: index === 6 ? "补词机会" : gap > 0 ? "本品优势" : "排名机会"
        };
      });
      const profileRows = [
        ["性别", "女", 82.4, 79.1],
        ["性别", "男", 17.6, 20.9],
        ["年龄", "26-35岁", 41.2, 34.8],
        ["年龄", "36-45岁", 52.1, 57.3],
        ["省份", "广东", 18.6, 14.2],
        ["省份", "北京", 7.8, 13.1],
        ["城市", "上海市", 8.4, 11.6],
        ["城市", "深圳市", 6.9, 4.5]
      ].map(([dimension, name, selfRate, competitorRate]) => {
        const adjustedSelf = Number((selfRate + (seed % 3) * 0.2).toFixed(2));
        const gap = Number((adjustedSelf - competitorRate).toFixed(2));
        return {
          dimension,
          name,
          self_rate: adjustedSelf,
          competitor_rate: competitorRate,
          gap_rate: gap,
          judgement: gap >= 1 ? "本品领先" : gap <= -1 ? "本品落后" : "基本持平"
        };
      });
      const metrics = [
        {
          id: "gmv",
          label: "成交金额",
          unit: "",
          self_value: selfGmv,
          competitor_value: competitorGmv,
          gap_text: `本品领先 ${gmvGap.toLocaleString("zh-CN")} | 本品 ${gmvRatio}x`,
          status: "advantage"
        },
        {
          id: "visitors",
          label: "访客数",
          unit: "",
          self_value: selfVisitors,
          competitor_value: competitorVisitors,
          gap_text: `本品领先 ${visitorGap.toLocaleString("zh-CN")} | 本品 ${visitorRatio}x`,
          status: "advantage"
        },
        {
          id: "conversion_rate",
          label: "成交转化率",
          unit: "%",
          self_value: selfConversion,
          competitor_value: competitorConversion,
          gap_text: `本品落后 ${Math.abs(conversionGap).toFixed(2)}pct | 竞品 ${(competitorConversion / selfConversion).toFixed(2)}x`,
          status: "warning"
        },
        {
          id: "aov",
          label: "成交客单价",
          unit: "",
          self_value: selfAov,
          competitor_value: competitorAov,
          gap_text: `本品落后 ${Math.abs(aovGap).toFixed(2)} | 竞品 ${(competitorAov / selfAov).toFixed(2)}x`,
          status: "warning"
        }
      ];
      return {
        schema_version: "1.0",
        meta: {
          title: "竞品准真实值看板",
          period,
          period_start: periodStart,
          period_end: periodEnd,
          granularity,
          self_spu: "SELF-DEMO",
          competitor_spu: "COMP-DEMO",
          summary: "本品成交金额、访客规模领先。",
          weakness_summary: "成交转化率、成交客单价落后，需要优先优化。"
        },
        core_metrics: metrics,
        tabs: [
          {
            id: "traffic",
            label: "流量来源",
            headline: "流量差距主要来自搜索、频道和推荐的访客规模差",
            highlights: trafficRows.slice(0, 5).map((row) => ({
              label: row.path,
              self_value: row.self_visitors,
              competitor_value: row.competitor_visitors,
              gap_text: `${row.judgement} ${Math.abs(row.visitor_gap).toLocaleString("zh-CN")}`,
              action: row.suggested_action,
              status: row.visitor_gap >= 0 ? "advantage" : "warning"
            })),
            columns: [
              { key: "path", label: "渠道路径" },
              { key: "self_visitors", label: "本品访客" },
              { key: "competitor_visitors", label: "竞品访客" },
              { key: "visitor_gap", label: "访客差距" },
              { key: "judgement", label: "判断" },
              { key: "suggested_action", label: "建议动作" }
            ],
            rows: trafficRows,
            notes: ["周和月数据来自对应粒度源表，不由日报聚合。"]
          },
          {
            id: "keywords",
            label: "关键词",
            headline: "核心搜索词覆盖领先，竞品独有词需要补充",
            highlights: keywordRows.slice(0, 5).map((row) => ({
              label: row.keyword,
              self_value: row.self_visitors,
              competitor_value: row.competitor_visitors,
              gap_text: `${row.coverage_relation} | ${row.opportunity}`,
              action: row.opportunity === "补词机会" ? "补充词包并验证页面承接" : "保持排名并优化搜索转化",
              status: row.opportunity === "补词机会" ? "warning" : "advantage"
            })),
            columns: [
              { key: "keyword", label: "关键词" },
              { key: "coverage_relation", label: "覆盖关系" },
              { key: "self_visitors", label: "本品访客" },
              { key: "competitor_visitors", label: "竞品访客" },
              { key: "visitor_gap", label: "访客差距" },
              { key: "opportunity", label: "机会判断" }
            ],
            rows: keywordRows,
            notes: ["完整表保留当前周期披露的全部关键词。"]
          },
          {
            id: "customer_profile",
            label: "客户画像",
            headline: "画像差异集中在年龄与区域结构",
            highlights: profileRows.slice().sort((a, b) => Math.abs(b.gap_rate) - Math.abs(a.gap_rate)).slice(0, 5).map((row) => ({
              label: `${row.dimension}：${row.name}`,
              self_value: row.self_rate,
              competitor_value: row.competitor_rate,
              unit: "%",
              gap_text: `${row.judgement} ${Math.abs(row.gap_rate).toFixed(2)}pct`,
              action: row.judgement === "本品落后" ? "调整素材表达并验证人群承接" : "延续优势人群内容表达",
              status: row.judgement === "本品落后" ? "warning" : "advantage"
            })),
            columns: [
              { key: "name", label: "画像项" },
              { key: "self_rate", label: "本品占比", unit: "%" },
              { key: "competitor_rate", label: "竞品占比", unit: "%" },
              { key: "gap_rate", label: "占比差距", unit: "pct" },
              { key: "judgement", label: "判断" }
            ],
            dimension_field: "dimension",
            dimension_label: "画像维度",
            rows: profileRows,
            notes: ["性别、年龄、省份、城市分别比较。"]
          }
        ],
        diagnosis: [
          {
            title: "优势：成交金额",
            evidence: metrics[0].gap_text,
            recommendation: "保持高贡献渠道资源位，沉淀可复用的词包和页面承接组合。",
            status: "advantage"
          },
          {
            title: "优势：访客数",
            evidence: metrics[1].gap_text,
            recommendation: "持续跟踪搜索、频道和推荐入口，避免规模优势被竞品缩小。",
            status: "advantage"
          },
          {
            title: "短板：成交转化率",
            evidence: metrics[2].gap_text,
            recommendation: "优先核查价格权益、详情页首屏、评价晒图与搜索词承接。",
            status: "warning"
          },
          {
            title: "短板：成交客单价",
            evidence: metrics[3].gap_text,
            recommendation: "测试组合装、满减门槛和高客单 SKU 的页面露出。",
            status: "warning"
          }
        ],
        risks: ["当前页面使用结构化演示数据，正式报告以对应日、周、月源表为准。"]
      };
    }

    /**
     * 功能说明：创建包含日、周、月独立报告的演示数据包。
     * 返回值：可由页面直接切换的多周期数据包。
     */
    function buildDemoBundle() {
      const days = Array.from({ length: 8 }, (_, index) => {
        const day = String(index + 1).padStart(2, "0");
        return buildDemoReport("day", `2026-06-${day}`, `2026-06-${day}`, index + 1);
      });
      const weeks = [
        ["2026-06-01", "2026-06-07"],
        ["2026-06-08", "2026-06-14"],
        ["2026-06-15", "2026-06-21"],
        ["2026-06-22", "2026-06-28"]
      ].map(([start, end], index) => buildDemoReport("week", start, end, index + 3));
      return {
        schema_version: "1.0",
        updated_at: "2026-06-09T09:00:00+08:00",
        reports: {
          day: days,
          week: weeks,
          month: [buildDemoReport("month", "2026-06-01", "2026-06-29", 6)]
        }
      };
    }

    /**
     * 功能说明：渲染粒度按钮、周期选项和当前数据状态。
     * 返回值：无返回值，直接更新 DOM。
     */
    function renderBundleControls() {
      const reportsByGranularity = state.bundle?.reports || {};
      const switcher = document.querySelector("#granularity-switch");
      switcher.innerHTML = Object.entries(granularityLabels).map(([key, label]) => {
        const count = (reportsByGranularity[key] || []).length;
        return `
          <button class="granularity-button ${key === state.activeGranularity ? "active" : ""}" type="button" data-granularity="${key}" ${count ? "" : "disabled"}>
            <span>${label}</span><span class="granularity-count">${count}</span>
          </button>
        `;
      }).join("");
      switcher.querySelectorAll("[data-granularity]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeGranularity = button.dataset.granularity;
          activateSelectedReport();
        });
      });

      const reports = reportsByGranularity[state.activeGranularity] || [];
      const selected = state.selectedPeriods[state.activeGranularity] || reports.at(-1)?.meta?.period || "";
      const periodSelect = document.querySelector("#period-select");
      periodSelect.innerHTML = reports.slice().reverse().map((report, index) => `
        <option value="${report.meta.period}" ${report.meta.period === selected ? "selected" : ""}>
          ${report.meta.period}${index === 0 ? "（最新）" : ""}
        </option>
      `).join("");
      periodSelect.disabled = reports.length === 0;
      periodSelect.onchange = (event) => {
        state.selectedPeriods[state.activeGranularity] = event.target.value;
        activateSelectedReport();
      };
      document.querySelector("#period-note").textContent = `${granularityLabels[state.activeGranularity]}维度共 ${reports.length} 个周期`;
    }

    /**
     * 功能说明：按当前粒度和周期选择激活一份分析报告。
     * 返回值：无返回值，直接渲染当前报告。
     */
    function activateSelectedReport() {
      const reports = state.bundle?.reports?.[state.activeGranularity] || [];
      if (!reports.length) {
        return;
      }
      const selectedPeriod = state.selectedPeriods[state.activeGranularity] || reports.at(-1).meta.period;
      const report = reports.find((item) => item.meta.period === selectedPeriod) || reports.at(-1);
      state.selectedPeriods[state.activeGranularity] = report.meta.period;
      renderBundleControls();
      renderDashboard(report);
    }

    /**
     * 功能说明：载入完整数据包并默认展示最新日报。
     * 参数 bundle：包含日、周、月报告数组的数据包。
     * 返回值：无返回值，直接初始化页面。
     */
    function renderBundle(bundle) {
      state.bundle = bundle;
      state.activeGranularity = bundle.reports?.day?.length ? "day" : Object.keys(granularityLabels).find((key) => bundle.reports?.[key]?.length) || "day";
      Object.keys(granularityLabels).forEach((key) => {
        const reports = bundle.reports?.[key] || [];
        if (reports.length) {
          state.selectedPeriods[key] = reports.at(-1).meta.period;
        }
      });
      document.querySelector("#updated-at").textContent = `数据更新至 ${bundle.updated_at?.slice(0, 10) || "-"}`;
      activateSelectedReport();
    }

    /**
     * 功能说明：把 analysis_result 结构渲染到看板页面。
     * 参数 data：分析结果 JSON 对象。
     * 返回值：无返回值，直接更新 DOM。
     */
    function renderDashboard(data) {
      console.info("开始渲染看板", data?.meta);
      state.data = data;
      state.filter = "";
      state.dimensions = {};
      document.querySelector("#title").textContent = data.meta?.title || "竞品准真实值看板";
      document.querySelector("#meta").textContent = [
        data.meta?.period,
        data.meta?.granularity ? `分析粒度：${granularityLabels[data.meta.granularity] || data.meta.granularity}` : "",
        data.meta?.self_spu ? `本品 SPU ${data.meta.self_spu}` : "",
        data.meta?.competitor_spu ? `竞品 SPU ${data.meta.competitor_spu}` : ""
      ].filter(Boolean).join(" | ");
      document.querySelector("#summary").textContent = data.meta?.summary || "-";
      document.querySelector("#hero-note").textContent = data.meta?.weakness_summary || "-";

      const metrics = document.querySelector("#metrics");
      metrics.innerHTML = (data.core_metrics || []).map((item) => `
        <article class="metric-card">
          <p class="metric-title">${item.label || "-"}</p>
          <div class="metric-values">
            <div>
              <div class="value self">${formatValue(item.self_value, item.unit)}</div>
              <div class="sub">本品真实值</div>
            </div>
            <div>
              <div class="value competitor">${formatValue(item.competitor_value, item.unit)}</div>
              <div class="sub">竞品估算值</div>
            </div>
          </div>
          <div class="gap ${item.status === "warning" ? "warning" : "advantage"}">${item.gap_text || "-"}</div>
        </article>
      `).join("");

      renderTabs();
      renderDiagnosis();
      document.querySelector("#risks").textContent = `风险提示：${(data.risks || ["暂无"]).join("；")}`;
      console.info("看板渲染完成");
    }

    /**
     * 功能说明：渲染差距来源 Tab 导航与当前面板。
     * 返回值：无返回值，直接更新 DOM。
     */
    function renderTabs() {
      const tabs = state.data?.tabs || [];
      const nav = document.querySelector("#tabs");
      nav.innerHTML = tabs.map((tab, index) => `
        <button class="tab ${index === state.activeTab ? "active" : ""}" type="button" data-tab-index="${index}">
          ${tab.label || `Tab ${index + 1}`}
        </button>
      `).join("");

      nav.querySelectorAll("[data-tab-index]").forEach((button) => {
        button.addEventListener("click", () => {
          state.activeTab = Number(button.dataset.tabIndex);
          state.filter = "";
          console.info("切换分析 Tab", state.activeTab);
          renderTabs();
        });
      });

      const current = tabs[state.activeTab] || tabs[0] || {};
      const highlights = current.highlights || current.items || [];
      const max = Math.max(0, ...highlights.flatMap((item) => [
        typeof item.self_value === "number" ? item.self_value : 0,
        typeof item.competitor_value === "number" ? item.competitor_value : 0
      ]));
      const rows = current.rows || [];
      const columns = current.columns || [];
      const dimensionField = current.dimension_field;
      const dimensionOptions = dimensionField
        ? [...new Set(rows.map((row) => row[dimensionField]).filter(Boolean))]
        : [];
      const activeDimension = state.dimensions?.[current.id] || dimensionOptions[0] || "";
      const query = (state.filter || "").trim().toLowerCase();
      const dimensionRows = activeDimension
        ? rows.filter((row) => row[dimensionField] === activeDimension)
        : rows;
      const filteredRows = query
        ? dimensionRows.filter((row) => Object.values(row).some((value) => String(value ?? "").toLowerCase().includes(query)))
        : dimensionRows;

      document.querySelector("#tab-body").innerHTML = `
        <h3>${current.headline || "-"}</h3>
        <section class="tab-section">
          <p class="tab-section-title">AI 建议重点</p>
          <div class="insight-grid">
            ${highlights.map((item) => `
              <article class="insight-card ${item.status === "warning" ? "warning" : "advantage"}">
                <h4>${item.label || "-"}</h4>
                <p>${item.gap_text || "-"}</p>
                ${item.action ? `<p>${item.action}</p>` : ""}
              </article>
            `).join("")}
          </div>
        </section>
        <section class="tab-section">
          <div class="table-tools">
            <p class="tab-section-title">完整数据对比</p>
            <input class="data-filter" id="data-filter" type="search" placeholder="筛选当前表格" value="${state.filter || ""}">
          </div>
          ${dimensionOptions.length ? `
            <div class="dimension-tabs">
              ${dimensionOptions.map((dimension) => `
                <button class="dimension-tab ${dimension === activeDimension ? "active" : ""}" type="button" data-dimension="${dimension}">
                  ${dimension}
                </button>
              `).join("")}
            </div>
          ` : ""}
          ${columns.length ? `
            <div class="table-wrap">
              <table class="data-table">
                <thead>
                  <tr>${columns.map((column) => `<th>${column.label}</th>`).join("")}</tr>
                </thead>
                <tbody>
                  ${filteredRows.map((row) => `
                    <tr>
                      ${columns.map((column) => `<td>${renderCell(row, column)}</td>`).join("")}
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          ` : `
            <div>
              ${highlights.map((item) => `
            <div class="compare-row">
              <div class="label">
                ${item.label || "-"}
                ${item.gap_text ? `<div class="sub">${item.gap_text}</div>` : ""}
              </div>
              <div class="bar-wrap">
                <span>本品 ${formatValue(item.self_value, item.unit)}</span>
                <div class="bar bar-self"><span style="width:${ratioWidth(item.self_value, max)}%"></span></div>
              </div>
              <div class="bar-wrap">
                <span>竞品 ${formatValue(item.competitor_value, item.unit)}</span>
                <div class="bar bar-competitor"><span style="width:${ratioWidth(item.competitor_value, max)}%"></span></div>
              </div>
            </div>
              `).join("")}
            </div>
          `}
        </section>
        <ul class="notes">
          ${(current.notes || []).map((note) => `<li>${note}</li>`).join("")}
        </ul>
      `;

      const filter = document.querySelector("#data-filter");
      if (filter) {
        filter.addEventListener("input", (event) => {
          state.filter = event.target.value;
          renderTabs();
          document.querySelector("#data-filter")?.focus();
        });
      }

      document.querySelectorAll("[data-dimension]").forEach((button) => {
        button.addEventListener("click", () => {
          state.dimensions = state.dimensions || {};
          state.dimensions[current.id] = button.dataset.dimension;
          state.filter = "";
          renderTabs();
        });
      });
    }

    /**
     * 功能说明：渲染诊断建议卡片。
     * 返回值：无返回值，直接更新 DOM。
     */
    function renderDiagnosis() {
      const target = document.querySelector("#diagnosis");
      target.innerHTML = (state.data?.diagnosis || []).map((item) => `
        <section class="diagnosis-card ${item.status === "warning" ? "warning" : "advantage"}">
          <h3>${item.title || "-"}</h3>
          <p class="diagnosis-evidence">${item.evidence || item.text || "-"}</p>
          ${item.recommendation ? `
            <div class="diagnosis-advice">
              <span class="diagnosis-advice-label">建议</span>
              <p>${item.recommendation}</p>
            </div>
          ` : ""}
        </section>
      `).join("");
    }

    renderBundle(buildDemoBundle());
  </script>
</body>
</html>
