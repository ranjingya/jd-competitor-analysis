<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日历样式对比 Playground</title>
  <link rel="stylesheet" href="/src/calendar-style-playground.css" />
</head>
<body>
  <main class="playground-shell">
    <header class="playground-header">
      <div>
        <p class="eyebrow">日期选择器 · 视觉方案</p>
        <h1>把日、周统一为表格式日历</h1>
        <p class="intro">四套方案共用完全相同的日期坐标。日模式选择单格，周模式选择整行，并保留周数摘要。</p>
      </div>
      <a href="/" class="back-link">返回正式看板</a>
    </header>

    <section class="preview-grid" id="preview-grid" aria-label="日历样式方案"></section>
  </main>
  <script type="module" src="/src/calendar-style-playground.js"></script>
</body>
</html>
