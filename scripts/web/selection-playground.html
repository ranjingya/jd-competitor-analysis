<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="竞品看板指标卡选中效果对比">
  <title>指标卡选中效果 Playground</title>
  <link rel="stylesheet" href="/src/selection-playground.css">
</head>
<body>
  <main class="playground-page">
    <header class="playground-header">
      <div>
        <p class="eyebrow">SELECTION PLAYGROUND</p>
        <h1>指标卡选中效果对比</h1>
        <p class="subtitle" id="data-note">正在读取当前报告数据</p>
      </div>
      <a class="back-link" href="/">返回正式看板</a>
    </header>

    <nav class="effect-switch" aria-label="选中效果方案">
      <button class="effect-option active" type="button" data-effect="a" aria-pressed="true">
        <strong>A · 柔和描边</strong><span>克制、稳定</span>
      </button>
      <button class="effect-option" type="button" data-effect="b" aria-pressed="false">
        <strong>B · 指向箭头</strong><span>关联趋势图</span>
      </button>
      <button class="effect-option" type="button" data-effect="c" aria-pressed="false">
        <strong>C · 底部短线</strong><span>轻量导航感</span>
      </button>
      <button class="effect-option" type="button" data-effect="d" aria-pressed="false">
        <strong>D · 状态加深</strong><span>只使用棕绿</span>
      </button>
      <button class="effect-option" type="button" data-effect="e" aria-pressed="false">
        <strong>E · 浮起层级</strong><span>强调当前卡片</span>
      </button>
    </nav>

    <section class="effect-description">
      <span class="effect-badge" id="effect-badge">方案 A</span>
      <p id="effect-description">使用低对比深色描边和轻阴影，不增加额外符号。</p>
    </section>

    <section class="demo-stage effect-a" id="demo-stage">
      <section class="metric-zone" id="playground-metrics" aria-label="核心指标选择"></section>
      <section class="chart-zone" aria-labelledby="trend-title">
        <header class="chart-header">
          <p class="chart-eyebrow">指标趋势</p>
          <h2 id="trend-title">趋势数据载入中</h2>
          <p id="trend-scope">-</p>
        </header>
        <div class="trend-chart" id="trend-chart" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <script type="module" src="/src/selection-playground.js"></script>
</body>
</html>
