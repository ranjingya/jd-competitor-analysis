<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="京东自营竞品准真实值分析看板">
  <title>竞品准真实值看板</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <main class="page">
    <header class="report-header">
      <div>
        <h1 id="title">竞品准真实值看板</h1>
        <p class="meta" id="meta">正在读取报告索引</p>
      </div>
      <div class="data-status" aria-live="polite">
        <span class="status-dot" aria-hidden="true"></span>
        <span id="updated-at">等待数据</span>
      </div>
    </header>

    <section class="view-switcher" aria-label="分析周期切换">
      <div class="period-summary" id="period-note">正在读取可用周期</div>
      <div class="period-control" id="period-picker"></div>
    </section>

    <section class="page-state" id="page-state" aria-live="polite">正在加载报告数据</section>

    <div id="dashboard" hidden>
      <section class="hero">
        <div class="hero-block">
          <p class="hero-label advantage">优点</p>
          <p class="summary" id="summary">-</p>
        </div>
        <div class="hero-block">
          <p class="hero-label warning">弱点</p>
          <p class="weakness-text" id="weakness">-</p>
        </div>
      </section>

      <section class="metrics-trend" aria-label="核心指标与趋势">
        <section class="metrics" id="metrics" aria-label="核心指标选择"></section>

        <section class="panel trend-panel" aria-labelledby="trend-title">
          <header class="trend-header">
            <div>
              <p class="trend-eyebrow">指标趋势</p>
              <h2 id="trend-title">成交金额趋势</h2>
              <p class="note" id="trend-scope">选择左侧指标查看周期变化</p>
            </div>
          </header>
          <div class="trend-chart" id="trend-chart" aria-live="polite">正在加载趋势数据</div>
        </section>
      </section>

      <section class="content">
        <article class="panel analysis-panel">
          <h2>差距来源分析</h2>
          <p class="note">流量来源、关键词、客户画像</p>
          <div class="tabs" id="tabs"></div>
          <div class="tab-body" id="tab-body"></div>
        </article>

        <aside class="panel ai-recommendations-panel">
          <h2>AI 建议</h2>
          <p class="note">覆盖三类差距来源，给出最多 5 条优先动作</p>
          <div class="ai-recommendations-list" id="ai-recommendations"></div>
        </aside>
      </section>

      <footer class="footnote" id="risks">-</footer>
    </div>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
