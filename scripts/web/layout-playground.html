<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="竞品看板指标与趋势布局对比 Playground">
  <title>指标趋势布局 Playground</title>
  <link rel="stylesheet" href="/src/layout-playground.css">
</head>
<body>
  <main class="playground-page">
    <header class="playground-header">
      <div>
        <p class="eyebrow">LAYOUT PLAYGROUND</p>
        <h1>指标卡与趋势图布局对比</h1>
        <p class="subtitle" id="data-note">正在读取当前报告数据</p>
      </div>
      <a class="back-link" href="/">返回正式看板</a>
    </header>

    <nav class="layout-switch" aria-label="布局方案">
      <button class="layout-option active" type="button" data-layout="a" aria-pressed="true">
        <strong>A · 左侧纵排</strong>
        <span>趋势优先，推荐</span>
      </button>
      <button class="layout-option" type="button" data-layout="b" aria-pressed="false">
        <strong>B · 左侧 2×2</strong>
        <span>纵向最紧凑</span>
      </button>
      <button class="layout-option" type="button" data-layout="c" aria-pressed="false">
        <strong>C · 顶部指标带</strong>
        <span>趋势横向最宽</span>
      </button>
    </nav>

    <section class="layout-description">
      <span class="layout-badge" id="layout-badge">方案 A</span>
      <p id="layout-description">四项指标在左侧形成纵向导航，右侧趋势图获得最大横向空间。</p>
    </section>

    <section class="demo-stage layout-a" id="demo-stage">
      <div class="comparison-shell">
        <section class="metric-zone" id="playground-metrics" aria-label="核心指标选择"></section>
        <section class="chart-zone" aria-labelledby="trend-title">
          <header class="chart-header">
            <div>
              <p class="chart-eyebrow">指标趋势</p>
              <h2 id="trend-title">趋势数据载入中</h2>
              <p id="trend-scope">-</p>
            </div>
          </header>
          <div class="trend-chart" id="trend-chart" aria-live="polite"></div>
        </section>
      </div>
    </section>
  </main>

  <script type="module" src="/src/layout-playground.js"></script>
</body>
</html>
