<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="分析周期日历选择器 Playground">
  <title>分析周期日历 Playground</title>
  <link rel="stylesheet" href="/src/calendar-playground.css">
</head>
<body>
  <main class="playground-shell">
    <header class="page-header">
      <a class="back-link" href="/">← 返回分析看板</a>
      <p class="eyebrow">PERIOD SELECTOR PLAYGROUND</p>
      <h1>一个日历，选择日、周、月</h1>
      <p class="intro">点击打开查看回弹动效。日选单格，周选整行，月选月份；选择具体周期后日历保持打开。</p>
    </header>

    <section class="demo-card" aria-labelledby="demo-title">
      <header class="demo-heading">
        <div>
          <p class="section-label">分析周期</p>
          <h2 id="demo-title">紧凑弹层日历</h2>
        </div>
        <div class="current-selection" aria-live="polite">
          <span>当前选择</span>
          <strong id="current-selection">正在读取报告</strong>
        </div>
      </header>

      <div class="dashboard-strip">
        <div class="strip-context">
          <span>竞品准真实值看板</span>
          <strong>核心指标与趋势</strong>
        </div>
        <div class="period-field">
          <label for="period-trigger">分析周期</label>
          <button class="period-trigger" id="period-trigger" type="button" aria-expanded="false" aria-controls="period-popover">
            <span class="calendar-icon" aria-hidden="true">▦</span>
            <span id="trigger-label">正在读取报告</span>
            <span class="chevron" aria-hidden="true">⌄</span>
          </button>
          <div class="period-popover" id="period-popover"></div>
        </div>
      </div>
    </section>

    <p class="usage-note"><span></span>琥珀点代表已有报告；具体周期选中后弹层持续打开，可继续比较其他周期。</p>
  </main>

  <script type="module" src="/src/calendar-playground.js"></script>
</body>
</html>
